<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages: redirect to root and let HashRouter handle the path.
      var path = window.location.pathname + window.location.search;
      window.location.replace("/#" + path);
    </script>
  </head>
  <body></body>
</html>
